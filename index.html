<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIFA World Cup 2026 Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161a30;
    --surface:#21263f;
    --surface2:#2b3158;
    --text:#FFFFFF;
    --text-secondary:#9099c0;
    --pink:#ff5d8f;
    --teal:#34e3c4;
    --orange:#ffb648;
    --purple:#8c6bff;
    --gold:#ffd76b;
    --red:#ff5d6c;
    --header-h:56px;
    --tabs-h:48px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-top:calc(var(--header-h) + var(--tabs-h));
  }
  h1,h2,h3,.headline,.tab-btn,.team-name,.bracket-name{font-family:'Bebas Neue',sans-serif; letter-spacing:0.5px;}

  /* ===== HEADER ===== */
  header{
    position:fixed; top:0; left:0; right:0; height:var(--header-h);
    background:linear-gradient(135deg, var(--purple), #4b3aa8);
    border-bottom:2px solid var(--teal);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 12px; z-index:100;
  }
  .brand{display:flex; align-items:center; gap:8px;}
  .trophy{
    font-size:24px;
    background:linear-gradient(90deg, #fff7cc 0%, var(--gold) 25%, #fff7cc 50%, var(--gold) 75%, #fff7cc 100%);
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
  }
  @keyframes shimmer{ to{ background-position:-200% center; } }
  .brand-text{font-size:18px; line-height:1; color:var(--text);}
  .brand-text .yr{color:var(--gold);}
  .header-right{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-secondary); text-align:right;}
  #refreshBtn{
    background:var(--pink); border:none; color:#fff; border-radius:6px;
    width:32px; height:32px; font-size:16px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s;
  }
  #refreshBtn:active{transform:rotate(180deg);}
  #refreshBtn.spinning{animation:spin 0.8s linear infinite;}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== TABS ===== */
  nav.tabs{
    position:fixed; top:var(--header-h); left:0; right:0; height:var(--tabs-h);
    display:flex; background:var(--surface); z-index:99;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .tab-btn{
    flex:1; background:none; border:none; color:var(--text-secondary);
    font-size:12.5px; letter-spacing:1px; cursor:pointer; position:relative;
    display:flex; align-items:center; justify-content:center; padding:0 2px;
    transition:color .2s;
  }
  .tab-btn.active{color:var(--text);}
  .tab-btn.active::after{
    content:''; position:absolute; bottom:0; left:10%; right:10%; height:3px;
    background:var(--teal); border-radius:2px 2px 0 0;
  }

  /* ===== LAYOUT ===== */
  main{max-width:900px; margin:0 auto; padding:12px;}
  .tab-panel{display:none; animation:fadein .25s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .banner{
    padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .banner.warn{background:rgba(255,215,0,0.12); border:1px solid var(--gold); color:var(--gold);}
  .banner.error{background:rgba(255,93,108,0.12); border:1px solid var(--red); color:#ff8a93;}
  .banner button{
    background:var(--purple); border:none; color:#fff; padding:5px 10px; border-radius:6px;
    font-size:12px; cursor:pointer; flex-shrink:0;
  }

  /* ===== SECTION HEADINGS ===== */
  .section-title{font-size:24px; margin:4px 0 12px; color:var(--gold);}

  /* ===== BRACKET ===== */
  .bracket-wrap{
    overflow-x:auto; border-radius:12px;
    background:
      linear-gradient(rgba(22,26,48,0.9), rgba(22,26,48,0.9)),
      repeating-linear-gradient(45deg, #2a1f4d 0 10px, transparent 10px 20px);
    background-color:#181c33;
    padding:16px 8px;
  }
  .bracket{display:flex; gap:28px; min-width:1100px;}
  .bracket-round{display:flex; flex-direction:column; justify-content:space-around; gap:14px; flex:1; min-width:160px;}
  .bracket-round-title{
    text-align:center; color:var(--gold); font-size:14px; margin-bottom:4px;
    text-transform:uppercase; letter-spacing:2px;
  }
  .bracket-match{
    background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:8px;
    padding:6px; position:relative;
  }
  .bracket-match::after{
    content:''; position:absolute; right:-28px; top:50%; width:28px; height:1px;
    background:linear-gradient(to right, var(--gold), transparent 90%);
  }
  .bracket-round:last-child .bracket-match::after{display:none;}
  .bracket-team{
    display:flex; align-items:center; gap:6px; padding:4px 6px; border-radius:4px; font-size:14px;
    cursor:pointer;
  }
  .bracket-team:hover{background:rgba(255,255,255,0.06);}
  .bracket-team .flag{font-size:16px; width:20px; text-align:center;}
  .bracket-team .bracket-name{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bracket-team .bscore{font-size:14px; font-weight:700; color:var(--gold); font-family:'Inter',sans-serif;}
  .bracket-team.eliminated{color:#5b6577; text-decoration:line-through;}
  .bracket-team.tbd{
    border:1px dashed rgba(255,255,255,0.2); color:var(--text-secondary);
    justify-content:center; font-size:12px; letter-spacing:1px;
  }
  .live-dot{
    width:8px; height:8px; border-radius:50%; background:var(--red); flex-shrink:0;
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(1.4); } }

  /* ===== BRACKET: GROUP STAGE PREVIEW ===== */
  .bracket-preview{margin-bottom:18px;}
  .bp-header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .bp-header .section-title{margin:0;}
  .bp-progress-label{font-size:11px; color:var(--text-secondary); font-family:'Inter',sans-serif; letter-spacing:1px;}
  .bp-progress-bar{
    height:6px; border-radius:3px; background:rgba(255,255,255,0.08); overflow:hidden; margin-bottom:10px;
  }
  .bp-progress-fill{
    height:100%; background:linear-gradient(90deg, var(--teal), var(--pink)); border-radius:3px;
    transition:width 0.6s ease;
  }
  .bp-note{
    font-size:12px; color:var(--text-secondary); margin-bottom:14px; line-height:1.5;
    border-left:2px solid var(--gold); padding-left:8px;
  }
  .bp-groups{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .bp-group-card{
    flex:0 0 132px; scroll-snap-align:start;
    background:var(--surface); border:1px solid rgba(255,255,255,0.06); border-top:2px solid var(--gold);
    border-radius:8px; padding:8px 10px;
  }
  .bp-group-title{
    font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--gold); margin-bottom:6px;
  }
  .bp-team{
    display:flex; align-items:center; gap:6px; font-size:12px; padding:2px 0;
    white-space:nowrap; overflow:hidden;
  }
  .bp-team .flag{font-size:14px; flex-shrink:0;}
  .bp-team .bp-name{flex:1; overflow:hidden; text-overflow:ellipsis;}
  .bp-team .bp-pts{font-family:'Inter',sans-serif; font-weight:700; color:var(--text-secondary); font-size:11px;}
  .bp-team.qualify .bp-pts{color:var(--gold);}

  /* tooltip */
  .tooltip{
    position:fixed; background:var(--surface2); border:1px solid var(--gold); border-radius:8px;
    padding:10px 12px; font-size:12px; z-index:300; max-width:220px; line-height:1.6;
    box-shadow:0 6px 20px rgba(0,0,0,0.5);
  }
  .tooltip .tt-title{color:var(--gold); font-family:'Bebas Neue',sans-serif; font-size:15px; margin-bottom:4px;}

  /* ===== MATCHES ===== */
  .subtabs{display:flex; gap:8px; margin-bottom:12px;}
  .subtab-btn{
    flex:1; padding:9px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
    background:var(--surface); color:var(--text-secondary); font-size:13px; cursor:pointer;
    font-family:'Bebas Neue',sans-serif; letter-spacing:1px;
  }
  .subtab-btn.active{background:var(--purple); color:#fff; border-color:var(--purple);}
  .match-card{
    background:var(--surface); border:1px solid rgba(255,255,255,0.06); border-radius:10px;
    padding:10px 12px; margin-bottom:10px;
  }
  .match-meta{display:flex; justify-content:space-between; font-size:11px; color:var(--text-secondary); margin-bottom:8px;}
  .match-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .match-team{display:flex; align-items:center; gap:8px; flex:1; min-width:0;}
  .match-team.right{justify-content:flex-end; text-align:right;}
  .match-team .flag{font-size:22px;}
  .match-team .team-name{font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .match-center{
    display:flex; flex-direction:column; align-items:center; min-width:64px; gap:4px;
  }
  .match-score{font-size:20px; font-weight:700; font-family:'Inter',sans-serif;}
  .match-time{font-size:13px; color:var(--text-secondary); font-family:'Inter',sans-serif;}
  .status-badge{
    font-size:10px; padding:2px 8px; border-radius:10px; letter-spacing:1px; font-weight:600;
  }
  .status-badge.ft{background:rgba(136,146,164,0.2); color:var(--text-secondary);}
  .status-badge.ns{background:rgba(52,227,196,0.15); color:var(--teal);}
  .status-badge.live{background:rgba(232,17,45,0.2); color:#ff5b6a; display:flex; align-items:center; gap:5px;}
  .status-badge.live .live-dot{width:6px; height:6px;}
  .calendar-btn{
    display:flex; align-items:center; justify-content:center; gap:6px;
    width:100%; margin-top:10px; padding:8px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.1); background:rgba(255,215,0,0.08);
    color:var(--gold); font-size:12px; font-weight:600; letter-spacing:1px;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .calendar-btn:active{background:rgba(255,215,0,0.18);}
  .empty-state{
    text-align:center; color:var(--text-secondary); padding:40px 16px; font-size:14px;
  }

  /* ===== GROUPS ===== */
  .group-accordion{
    background:var(--surface); border:1px solid rgba(255,255,255,0.06); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
  }
  .group-header{
    width:100%; background:none; border:none; color:#fff; padding:14px;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
    font-size:18px; font-family:'Bebas Neue',sans-serif; letter-spacing:1px;
  }
  .group-header .chev{transition:transform .25s; color:var(--gold);}
  .group-accordion.open .group-header .chev{transform:rotate(180deg);}
  .group-body{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .group-accordion.open .group-body{max-height:400px;}
  table.standings{width:100%; border-collapse:collapse; font-size:12px;}
  table.standings th, table.standings td{padding:8px 4px; text-align:center;}
  table.standings th{color:var(--text-secondary); font-weight:600; font-size:11px; border-bottom:1px solid rgba(255,255,255,0.08);}
  table.standings td:nth-child(2){text-align:left; padding-left:8px;}
  table.standings tr.qualify{background:rgba(255,215,0,0.08); color:var(--gold);}
  table.standings tr.bottom{background:rgba(136,146,164,0.06); color:var(--text-secondary);}
  table.standings .tname{display:flex; align-items:center; gap:6px; font-size:13px;}
  table.standings .pts{font-weight:700;}

  /* ===== SEARCH ===== */
  .search-input{
    width:100%; padding:11px 14px; margin-bottom:12px; border-radius:10px;
    border:1px solid rgba(255,255,255,0.1); background:var(--surface2); color:var(--text);
    font-size:14px; font-family:'Inter',sans-serif;
  }
  .search-input::placeholder{color:var(--text-secondary);}
  .search-input:focus{outline:none; border-color:var(--teal);}

  /* ===== HOME DASHBOARD ===== */
  .home-grid{display:flex; flex-direction:column; gap:12px;}
  .home-card{
    background:var(--surface); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:16px;
  }
  .home-card h3{margin:0 0 12px; font-size:16px; color:var(--text); letter-spacing:1px;}
  .progress-card{display:flex; align-items:center; gap:18px;}
  .donut{
    position:relative; width:104px; height:104px; border-radius:50%; flex-shrink:0;
    background:conic-gradient(var(--teal) calc(var(--pct,0) * 1%), rgba(255,255,255,0.08) 0);
    display:flex; align-items:center; justify-content:center;
  }
  .donut::before{
    content:''; position:absolute; inset:10px; border-radius:50%; background:var(--surface);
  }
  .donut-label{position:relative; text-align:center; font-family:'Inter',sans-serif;}
  .donut-label .pct{font-size:22px; font-weight:700; color:var(--text); display:block; line-height:1.1;}
  .donut-label .sub{font-size:10px; color:var(--text-secondary); letter-spacing:1px;}
  .progress-meta{flex:1;}
  .progress-meta .pm-title{font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; margin-bottom:4px;}
  .progress-meta .pm-sub{font-size:12px; color:var(--text-secondary);}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .stat-tile{
    background:var(--surface2); border-radius:12px; padding:12px; text-align:center;
  }
  .stat-tile .stat-value{font-size:24px; font-weight:700; font-family:'Inter',sans-serif;}
  .stat-tile .stat-label{font-size:11px; color:var(--text-secondary); letter-spacing:1px; margin-top:2px;}
  .stat-tile.pink .stat-value{color:var(--pink);}
  .stat-tile.teal .stat-value{color:var(--teal);}
  .stat-tile.orange .stat-value{color:var(--orange);}
  .stat-tile.purple .stat-value{color:var(--purple);}
  .countdown-row{display:flex; gap:10px;}
  .countdown-card{
    flex:1; background:var(--surface2); border-radius:12px; padding:12px; text-align:center;
  }
  .countdown-card .cd-value{font-size:22px; font-weight:700; font-family:'Inter',sans-serif; color:var(--orange);}
  .countdown-card .cd-label{font-size:11px; color:var(--text-secondary); letter-spacing:1px; margin-top:2px;}
  .scorer-row{display:flex; align-items:center; gap:10px; padding:6px 0; font-size:14px;}
  .scorer-row .scorer-rank{
    width:22px; height:22px; border-radius:50%; background:var(--surface2); color:var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;
  }
  .scorer-row .scorer-name{flex:1;}
  .scorer-row .scorer-goals{font-weight:700; color:var(--teal); font-family:'Inter',sans-serif;}
  .news-item{display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); text-decoration:none; color:var(--text);}
  .news-item:last-child{border-bottom:none;}
  .news-item img{width:64px; height:48px; object-fit:cover; border-radius:8px; flex-shrink:0; background:var(--surface2);}
  .news-item .news-headline{font-size:13px; line-height:1.4;}
  .news-item .news-time{font-size:11px; color:var(--text-secondary); margin-top:4px;}

  /* ===== PREDICT ===== */
  .predict-box{
    background:var(--surface); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:20px; text-align:center;
  }
  .predict-box h2{margin-top:0; font-size:26px;}
  #runPredictBtn{
    background:linear-gradient(135deg, var(--pink), var(--purple)); color:#fff; border:none;
    padding:16px 28px; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:20px;
    letter-spacing:2px; cursor:pointer; width:100%; margin:10px 0;
  }
  .predict-section{margin-top:16px;}
  .predict-section h3{font-size:16px; color:var(--gold); margin-bottom:10px;}
  .predict-bar-row{margin-bottom:10px;}
  .predict-bar-label{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;}
  .predict-bar-label .pct{font-weight:700; color:var(--teal); font-family:'Inter',sans-serif;}
  .predict-bar-track{height:8px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden;}
  .predict-bar-fill{height:100%; border-radius:4px; background:linear-gradient(90deg, var(--purple), var(--pink));}
  .predict-group-block{margin-bottom:18px;}
  .predict-group-block h4{font-size:13px; letter-spacing:2px; color:var(--text-secondary); margin-bottom:8px;}

  @media (min-width:700px){
    .bracket-wrap{padding:24px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="trophy">🏆</span>
    <span class="brand-text">FIFA WC <span class="yr">2026</span></span>
  </div>
  <div class="header-right">
    <span id="lastUpdated">Not loaded</span>
    <button id="refreshBtn" title="Refresh data">↻</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="home">HOME</button>
  <button class="tab-btn" data-tab="groups">GROUPS</button>
  <button class="tab-btn" data-tab="matches">MATCHES</button>
  <button class="tab-btn" data-tab="bracket">BRACKET</button>
  <button class="tab-btn" data-tab="predict">PREDICT</button>
</nav>

<main>
  <div id="banners"></div>

  <!-- HOME -->
  <section class="tab-panel active" id="panel-home">
    <h2 class="section-title">Dashboard</h2>
    <div class="home-grid" id="homeContainer"></div>
  </section>

  <!-- GROUPS -->
  <section class="tab-panel" id="panel-groups">
    <h2 class="section-title">Groups</h2>
    <input type="text" id="groupSearch" class="search-input" placeholder="Search team or group...">
    <div id="groupsContainer"></div>
  </section>

  <!-- MATCHES -->
  <section class="tab-panel" id="panel-matches">
    <h2 class="section-title">Matches</h2>
    <div class="subtabs">
      <button class="subtab-btn" data-subtab="past">PAST</button>
      <button class="subtab-btn active" data-subtab="today">TODAY</button>
      <button class="subtab-btn" data-subtab="upcoming">UPCOMING</button>
    </div>
    <div id="matchesContainer"></div>
  </section>

  <!-- BRACKET -->
  <section class="tab-panel" id="panel-bracket">
    <h2 class="section-title">Knockout Bracket</h2>
    <div class="bracket-wrap">
      <div class="bracket" id="bracketContainer"></div>
    </div>
  </section>

  <!-- PREDICT -->
  <section class="tab-panel" id="panel-predict">
    <h2 class="section-title">Predict</h2>
    <div class="predict-box">
      <h2>Who Wins From Here?</h2>
      <p style="color:var(--text-secondary); font-size:13px;">
        Run thousands of simulated outcomes for the remaining matches, based on current standings and form.
      </p>
      <button id="runPredictBtn">Run Simulation</button>
    </div>
    <div id="predictResults"></div>
  </section>
</main>

<div id="tooltipEl" class="tooltip" style="display:none;"></div>

<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */
  const CONFIG = {
    // Public, no-key ESPN endpoints — open CORS, no preflight required.
    scoreboardUrl: 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719',
    standingsUrl: 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings',
    newsUrl: 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news',
    cacheTTL: 60 * 60 * 1000 // 60 minutes
  };

  const ROUND_ORDER = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Final'];
  const ROUND_COUNTS = {'Round of 32':16,'Round of 16':8,'Quarter-finals':4,'Semi-finals':2,'Final':1};

  const NAME_TO_CODE = {
    "Argentina":"AR","Brazil":"BR","France":"FR","England":"GB-ENG","Spain":"ES","Portugal":"PT","Germany":"DE",
    "Netherlands":"NL","Belgium":"BE","Italy":"IT","Croatia":"HR","Uruguay":"UY","Colombia":"CO","Mexico":"MX",
    "USA":"US","United States":"US","Canada":"CA","Japan":"JP","South Korea":"KR","Korea Republic":"KR",
    "Morocco":"MA","Senegal":"SN","Switzerland":"CH","Denmark":"DK","Poland":"PL","Serbia":"RS","Wales":"GB-WLS",
    "Ecuador":"EC","Ghana":"GH","Cameroon":"CM","Tunisia":"TN","Costa Rica":"CR","Australia":"AU","Iran":"IR",
    "Saudi Arabia":"SA","Qatar":"QA","Ivory Coast":"CI","Cote d'Ivoire":"CI","Nigeria":"NG","Egypt":"EG",
    "Algeria":"DZ","Norway":"NO","Sweden":"SE","Austria":"AT","Czech Republic":"CZ","Ukraine":"UA","Turkey":"TR",
    "Scotland":"GB-SCT","Republic of Ireland":"IE","Ireland":"IE","Greece":"GR","Hungary":"HU","Romania":"RO",
    "Slovakia":"SK","Slovenia":"SI","Finland":"FI","Iceland":"IS","Israel":"IL","Jordan":"JO","Iraq":"IQ",
    "UAE":"AE","United Arab Emirates":"AE","Uzbekistan":"UZ","China":"CN","Australia":"AU","New Zealand":"NZ",
    "Panama":"PA","Honduras":"HN","Jamaica":"JM","Haiti":"HT","Curacao":"CW","Curaçao":"CW","Venezuela":"VE",
    "Peru":"PE","Chile":"CL","Bolivia":"BO","Paraguay":"PY","South Africa":"ZA","DR Congo":"CD","Mali":"ML",
    "Burkina Faso":"BF","Cape Verde":"CV","Gabon":"GA","Guinea":"GN","Zambia":"ZM","Benin":"BJ","Mozambique":"MZ",
    "India":"IN","Vietnam":"VN","Thailand":"TH","Bahrain":"BH","Kuwait":"KW","Oman":"OM","Indonesia":"ID",

    "Georgia":"GE","Armenia":"AM","Azerbaijan":"AZ","Kazakhstan":"KZ","Luxembourg":"LU","Montenegro":"ME"
  };

  function flagEmoji(name){
    const code = NAME_TO_CODE[name];
    if(!code || code.length !== 2) return '🏳️';
    return code.toUpperCase().replace(/./g, c => String.fromCodePoint(c.codePointAt(0) + 127397));
  }

  /* ================= STORAGE ================= */
  const Storage = {
    getCache(key){
      try{
        const raw = localStorage.getItem('wc2026_cache_' + key);
        if(!raw) return null;
        return JSON.parse(raw);
      }catch(e){ return null; }
    },
    setCache(key, data){
      localStorage.setItem('wc2026_cache_' + key, JSON.stringify({ timestamp: Date.now(), data }));
    },
    isFresh(entry){
      return entry && (Date.now() - entry.timestamp) < CONFIG.cacheTTL;
    }
  };

  /* ================= STATE ================= */
  const state = {
    standings: null,   // array of groups (each array of team standing objs)
    fixtures: null,    // array of fixture objs
    usingCache: false,
    error: null
  };

  /* ================= API ================= */
  const Api = {
    async request(url, cacheKey){
      const cached = Storage.getCache(cacheKey);
      if(Storage.isFresh(cached)){
        return { data: cached.data, fromCache: true };
      }

      if(location.protocol === 'file:'){
        if(cached) return { data: cached.data, fromCache: true };
        const err = new Error('FILE_PROTOCOL');
        err.detail = 'This page is open as a local file:// — browsers block API requests from local files. Open the GitHub Pages URL instead.';
        throw err;
      }

      let res;
      try{
        res = await fetch(url);
      }catch(e){
        console.error('Fetch failed:', e, 'url=', url, 'online=', navigator.onLine);
        if(cached) return { data: cached.data, fromCache: true };
        const err = new Error('NETWORK');
        err.detail = `${e.name}: ${e.message} — url=${url}`;
        throw err;
      }

      if(!res.ok){
        if(cached) return { data: cached.data, fromCache: true };
        const err = new Error('HTTP_' + res.status);
        throw err;
      }

      const data = await res.json();
      Storage.setCache(cacheKey, data);
      return { data, fromCache: false };
    },

    async getStandings(){
      const r = await Api.request(CONFIG.standingsUrl, 'standings');
      const groups = normalizeStandings(r.data);
      return { groups, fromCache: r.fromCache };
    },

    async getFixtures(){
      const r = await Api.request(CONFIG.scoreboardUrl, 'fixtures');
      const fixtures = normalizeFixtures(r.data);
      return { fixtures, fromCache: r.fromCache };
    },

    async getNews(){
      const r = await Api.request(CONFIG.newsUrl, 'news');
      const articles = normalizeNews(r.data);
      return { articles, fromCache: r.fromCache };
    }
  };

  /* ================= ESPN NORMALIZATION ================= */
  function statValue(entry, name){
    const stat = (entry.stats || []).find(s => s.name === name);
    return stat ? Number(stat.value) : 0;
  }

  function normalizeStandings(data){
    const children = (data && data.children) || [];
    return children.map(group => {
      const groupName = group.name || group.abbreviation || '';
      const entries = (group.standings && group.standings.entries) || [];
      return entries.map(entry => ({
        rank: statValue(entry, 'rank'),
        team: { name: entry.team.displayName },
        all: {
          played: statValue(entry, 'gamesPlayed'),
          win: statValue(entry, 'wins'),
          draw: statValue(entry, 'ties'),
          lose: statValue(entry, 'losses'),
          goals: { for: statValue(entry, 'pointsFor'), against: statValue(entry, 'pointsAgainst') }
        },
        goalsDiff: statValue(entry, 'pointDifferential'),
        points: statValue(entry, 'points'),
        group: groupName
      })).sort((a,b) => a.rank - b.rank);
    });
  }

  const SLUG_TO_ROUND = {
    'round-of-32': 'Round of 32',
    'round-of-16': 'Round of 16',
    'quarterfinals': 'Quarter-finals',
    'semifinals': 'Semi-finals',
    'third-place': 'Third Place',
    'final': 'Final'
  };

  function normalizeRound(event, comp){
    const slug = event.season && event.season.slug;
    if(slug && SLUG_TO_ROUND[slug]) return SLUG_TO_ROUND[slug];
    const note = (comp && comp.altGameNote) || '';
    const groupMatch = note.match(/Group [A-L]/i);
    if(groupMatch) return groupMatch[0];
    return note || '';
  }

  function normalizeFixtures(data){
    const events = (data && data.events) || [];
    return events.map(event => {
      const comp = event.competitions && event.competitions[0];
      const competitors = (comp && comp.competitors) || [];
      const home = competitors.find(c => c.homeAway === 'home') || {};
      const away = competitors.find(c => c.homeAway === 'away') || {};
      const state = event.status && event.status.type && event.status.type.state;
      const statusShort = state === 'in' ? 'LIVE' : state === 'post' ? 'FT' : 'NS';

      const teamNameById = {};
      if(home.team) teamNameById[home.team.id] = home.team.displayName;
      if(away.team) teamNameById[away.team.id] = away.team.displayName;
      const details = (comp && comp.details) || [];
      const scorers = details
        .filter(d => d.scoringPlay && !d.ownGoal && d.athletesInvolved && d.athletesInvolved[0])
        .map(d => ({
          name: d.athletesInvolved[0].displayName,
          team: teamNameById[d.team && d.team.id] || null
        }));

      return {
        fixture: { date: event.date, status: { short: statusShort } },
        league: { round: normalizeRound(event, comp) },
        teams: {
          home: { name: home.team && home.team.displayName, winner: home.winner },
          away: { name: away.team && away.team.displayName, winner: away.winner }
        },
        goals: {
          home: home.score !== undefined ? Number(home.score) : null,
          away: away.score !== undefined ? Number(away.score) : null
        },
        scorers
      };
    });
  }

  function normalizeNews(data){
    const articles = (data && data.articles) || [];
    return articles.map(a => ({
      headline: a.headline,
      link: a.links && a.links.web && a.links.web.href,
      image: a.images && a.images[0] && a.images[0].url,
      published: a.published
    }));
  }

  /* ================= BANNERS ================= */
  function showBanner(type, message, opts){
    opts = opts || {};
    const container = document.getElementById('banners');
    const div = document.createElement('div');
    div.className = 'banner ' + type;
    const span = document.createElement('span');
    span.textContent = message;
    div.appendChild(span);
    if(opts.retry){
      const btn = document.createElement('button');
      btn.textContent = 'Retry';
      btn.onclick = () => { loadAll(true); };
      div.appendChild(btn);
    }
    container.appendChild(div);
  }
  function clearBanners(){ document.getElementById('banners').innerHTML = ''; }

  /* ================= DATA LOAD ================= */
  async function loadAll(forceRefresh){
    clearBanners();
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');

    if(forceRefresh){
      localStorage.removeItem('wc2026_cache_standings');
      localStorage.removeItem('wc2026_cache_fixtures');
    }

    let standingsResult = null, fixturesResult = null, err = null;

    try{
      standingsResult = await Api.getStandings();
    }catch(e){ err = e; }

    try{
      fixturesResult = await Api.getFixtures();
    }catch(e){ err = err || e; }

    refreshBtn.classList.remove('spinning');

    state.standings = standingsResult ? standingsResult.groups : (state.standings || []);
    state.fixtures = fixturesResult ? fixturesResult.fixtures : (state.fixtures || []);

    const anyFromCache = (standingsResult && standingsResult.fromCache) || (fixturesResult && fixturesResult.fromCache);
    state.usingCache = !!anyFromCache && !!err;

    if(err){
      handleError(err, !!(standingsResult || fixturesResult));
    }

    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    renderAll();
  }

  function handleError(err, hasData){
    const msg = err.message;
    if(msg === 'FILE_PROTOCOL'){
      showBanner('error', err.detail);
      return;
    }
    const detail = err.detail ? ` (${err.detail})` : ` (${msg})`;
    if(hasData || state.standings || state.fixtures){
      showBanner('error', 'Could not refresh data — using cached data.' + detail, { retry:true });
    } else {
      showBanner('error', 'Could not load data.' + detail, { retry:true });
    }
  }

  /* ================= RENDER: ALL ================= */
  function renderAll(){
    renderHome();
    renderBracket();
    renderMatches();
    renderGroups();
    if(!state.standings || !state.standings.length){
      if(!state.fixtures || !state.fixtures.length){
        renderEmptyStates();
      }
    }
  }

  function renderEmptyStates(){
    const bc = document.getElementById('bracketContainer');
    if(!bc.children.length){
      bc.innerHTML = '<div class="empty-state">No data yet. Tap refresh, or wait for the tournament data to become available.</div>';
    }
  }

  /* ================= RENDER: HOME ================= */
  function daysUntil(dateStr){
    return Math.max(0, Math.ceil((new Date(dateStr) - new Date()) / 86400000));
  }

  function renderHome(){
    const container = document.getElementById('homeContainer');
    container.innerHTML = '';

    const fixtures = state.fixtures || [];
    const groups = state.standings || [];

    if(!fixtures.length && !groups.length){
      container.innerHTML = '<div class="empty-state">No data yet. Tap refresh, or wait for the tournament data to become available.</div>';
      return;
    }

    const isLive = f => ['1H','2H','HT','ET','BT','P','LIVE'].includes(f.fixture.status.short);
    const isDone = f => ['FT','AET','PEN'].includes(f.fixture.status.short);

    const total = fixtures.length;
    const done = fixtures.filter(isDone).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    const live = fixtures.filter(isLive).length;
    const todayStr = new Date().toDateString();
    const today = fixtures.filter(f => new Date(f.fixture.date).toDateString() === todayStr).length;
    const groupsDecided = groups.length ? groups.filter(g => g.every(t => t.all.played >= 3)).length : 0;

    // Progress card
    const progress = document.createElement('div');
    progress.className = 'home-card progress-card';
    progress.innerHTML = `
      <div class="donut" style="--pct:${pct}">
        <div class="donut-label"><span class="pct">${pct}%</span><span class="sub">PLAYED</span></div>
      </div>
      <div class="progress-meta">
        <div class="pm-title">Tournament Progress</div>
        <div class="pm-sub">${done} of ${total} matches played</div>
        <div class="pm-sub">${groupsDecided} of ${groups.length || 12} groups decided</div>
      </div>`;
    container.appendChild(progress);

    // Stat grid
    const stats = document.createElement('div');
    stats.className = 'home-card';
    stats.innerHTML = `<h3>At A Glance</h3>
      <div class="stat-grid">
        <div class="stat-tile teal"><div class="stat-value">${done}</div><div class="stat-label">MATCHES PLAYED</div></div>
        <div class="stat-tile pink"><div class="stat-value">${live}</div><div class="stat-label">LIVE NOW</div></div>
        <div class="stat-tile orange"><div class="stat-value">${today}</div><div class="stat-label">MATCHES TODAY</div></div>
        <div class="stat-tile purple"><div class="stat-value">${groupsDecided}/${groups.length || 12}</div><div class="stat-label">GROUPS DECIDED</div></div>
      </div>`;
    container.appendChild(stats);

    // Countdown card
    const countdownRounds = [
      { label: 'ROUND OF 16', round: 'Round of 16' },
      { label: 'SEMI-FINALS', round: 'Semi-finals' },
      { label: 'FINAL', round: 'Final' }
    ];
    const countdown = document.createElement('div');
    countdown.className = 'home-card';
    countdown.innerHTML = '<h3>Countdown</h3>';
    const row = document.createElement('div');
    row.className = 'countdown-row';
    countdownRounds.forEach(c => {
      const roundFixtures = fixtures.filter(f => f.league.round === c.round && f.fixture.date);
      const earliest = roundFixtures
        .map(f => f.fixture.date)
        .sort((a,b) => new Date(a) - new Date(b))[0];
      const value = earliest ? daysUntil(earliest) : 'TBD';
      const card = document.createElement('div');
      card.className = 'countdown-card';
      card.innerHTML = `<div class="cd-value">${value}</div><div class="cd-label">${c.label}${typeof value === 'number' ? ' (DAYS)' : ''}</div>`;
      row.appendChild(card);
    });
    countdown.appendChild(row);
    container.appendChild(countdown);

    // Top scorers card
    const scorerMap = {};
    fixtures.forEach(f => (f.scorers || []).forEach(s => {
      if(!s.name) return;
      if(!scorerMap[s.name]) scorerMap[s.name] = { count: 0, team: s.team };
      scorerMap[s.name].count++;
    }));
    const topScorers = Object.entries(scorerMap)
      .map(([name, v]) => ({ name, count: v.count, team: v.team }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 5);

    const scorers = document.createElement('div');
    scorers.className = 'home-card';
    scorers.innerHTML = '<h3>Top Scorers</h3>';
    if(topScorers.length){
      topScorers.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'scorer-row';
        row.innerHTML = `<span class="scorer-rank">${i + 1}</span><span class="scorer-name">${s.name} <span style="color:var(--text-secondary); font-size:11px;">${flagEmoji(s.team)} ${s.team || ''}</span></span><span class="scorer-goals">${s.count}</span>`;
        scorers.appendChild(row);
      });
    } else {
      scorers.innerHTML += '<div style="color:var(--text-secondary); font-size:13px;">Not available yet — check back once group stage goals are recorded.</div>';
    }
    container.appendChild(scorers);

    // News card
    const news = document.createElement('div');
    news.className = 'home-card';
    news.id = 'homeNewsCard';
    news.innerHTML = '<h3>Latest News</h3><div id="homeNewsList" style="color:var(--text-secondary); font-size:13px;">Loading…</div>';
    container.appendChild(news);
    renderHomeNews();
  }

  async function renderHomeNews(){
    const list = document.getElementById('homeNewsList');
    if(!list) return;
    try{
      const { articles } = await Api.getNews();
      if(!document.getElementById('homeNewsList')) return; // tab may have re-rendered
      if(!articles.length){
        document.getElementById('homeNewsList').textContent = 'No news available right now.';
        return;
      }
      const target = document.getElementById('homeNewsList');
      target.removeAttribute('style');
      target.innerHTML = '';

        item.href = a.link || '#';
        item.target = '_blank';

        const time = a.published ? new Date(a.published).toLocaleDateString([], { month: 'short', day: 'numeric' }) : '';
        item.innerHTML = `${a.image ? `<img src="${a.image}" alt="">` : ''}

  /* ================= RENDER: BRACKET ================= */
  function renderBracket(){
    const container = document.getElementById('bracketContainer');
    container.innerHTML = '';

    const fixtures = state.fixtures || [];
    const groups = state.standings || [];

    const r32 = fixtures.filter(f => f.league && f.league.round === 'Round of 32');
    const bracketReady = r32.some(f => f.teams.home && f.teams.home.name && f.teams.away && f.teams.away.name);

    if(!bracketReady && groups.length){
      container.appendChild(buildGroupStagePreview(groups, fixtures));
      if(!r32.length) return;
    }

    ROUND_ORDER.forEach(roundName => {
      const col = document.createElement('div');
      col.className = 'bracket-round';

      const title = document.createElement('div');
      title.className = 'bracket-round-title';
      title.textContent = roundName;
      col.appendChild(title);

      const roundFixtures = fixtures.filter(f => f.league && f.league.round === roundName);
      const count = ROUND_COUNTS[roundName];

      for(let i = 0; i < count; i++){
        const fx = roundFixtures[i];
        col.appendChild(buildBracketMatch(fx));
      }
      container.appendChild(col);
    });
  }

  function buildGroupStagePreview(groups, fixtures){
    const wrap = document.createElement('div');
    wrap.className = 'bracket-preview';

    const groupFixtures = fixtures.filter(f => /^Group [A-L]$/.test((f.league && f.league.round) || ''));
    const total = groupFixtures.length;
    const done = groupFixtures.filter(f => ['FT','AET','PEN'].includes(f.fixture.status.short)).length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    const header = document.createElement('div');
    header.className = 'bp-header';
    header.innerHTML = `<h2 class="section-title">GROUP STAGE</h2><span class="bp-progress-label">${done}/${total} PLAYED</span>`;
    wrap.appendChild(header);

    const bar = document.createElement('div');
    bar.className = 'bp-progress-bar';
    bar.innerHTML = `<div class="bp-progress-fill" style="width:${pct}%"></div>`;
    wrap.appendChild(bar);

    const note = document.createElement('div');
    note.className = 'bp-note';
    note.textContent = 'The knockout bracket unlocks once the Round of 32 matchups are confirmed. Here\'s how the groups stand right now:';
    wrap.appendChild(note);

    const strip = document.createElement('div');
    strip.className = 'bp-groups';
    groups.forEach((group, idx) => {
      const groupName = (group[0] && group[0].group) || `Group ${String.fromCharCode(65 + idx)}`;
      const card = document.createElement('div');
      card.className = 'bp-group-card';
      card.innerHTML = `<div class="bp-group-title">${groupName.replace('Group ', 'GROUP ')}</div>`;
      group.slice(0, 4).forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'bp-team' + (i < 2 ? ' qualify' : '');
        row.innerHTML = `<span class="flag">${flagEmoji(t.team.name)}</span><span class="bp-name">${t.team.name}</span><span class="bp-pts">${t.points}</span>`;
        card.appendChild(row);
      });
      strip.appendChild(card);
    });
    wrap.appendChild(strip);

    return wrap;
  }

  function buildBracketMatch(fx){
    const box = document.createElement('div');
    box.className = 'bracket-match';

    if(!fx){
      box.appendChild(buildBracketTeamRow(null));
      box.appendChild(buildBracketTeamRow(null));
      return box;
    }

    const status = fx.fixture.status.short;
    const isLive = ['1H','2H','HT','ET','BT','P','LIVE'].includes(status);
    const isDone = ['FT','AET','PEN'].includes(status);

    box.appendChild(buildBracketTeamRow(fx.teams.home, fx.goals.home, isDone, isLive, fx));
    box.appendChild(buildBracketTeamRow(fx.teams.away, fx.goals.away, isDone, isLive, fx));
    return box;
  }

  function buildBracketTeamRow(team, score, isDone, isLive, fx){
    const row = document.createElement('div');
    row.className = 'bracket-team';

    if(!team){
      row.classList.add('tbd');
      row.textContent = 'TBD';
      return row;
    }

    if(isLive){
      const dot = document.createElement('span');
      dot.className = 'live-dot';
      row.appendChild(dot);
    } else {
      const flag = document.createElement('span');
      flag.className = 'flag';
      flag.textContent = flagEmoji(team.name);
      row.appendChild(flag);
    }

    const name = document.createElement('span');
    name.className = 'bracket-name';
    name.textContent = team.name;
    row.appendChild(name);

    if(team.winner === false){
      row.classList.add('eliminated');
    }

    if(isDone && score !== null && score !== undefined){
      const sc = document.createElement('span');
      sc.className = 'bscore';
      sc.textContent = score;
      row.appendChild(sc);
    }

    row.addEventListener('click', (e) => showTeamTooltip(e, team));
    return row;
  }

  /* ================= TOOLTIP ================= */
  function getTeamRecord(teamName){
    let record = { played:0, win:0, draw:0, lose:0, gf:0, ga:0, last:null };
    (state.standings || []).forEach(group => {
      group.forEach(t => {
        if(t.team.name === teamName){
          record.played = t.all.played;
          record.win = t.all.win;
          record.draw = t.all.draw;
          record.lose = t.all.lose;
          record.gf = t.all.goals.for;
          record.ga = t.all.goals.against;
        }
      });
    });
    const played = (state.fixtures || [])
      .filter(f => ['FT','AET','PEN'].includes(f.fixture.status.short))
      .filter(f => f.teams.home.name === teamName || f.teams.away.name === teamName)
      .sort((a,b) => new Date(b.fixture.date) - new Date(a.fixture.date));
    if(played.length){
      const f = played[0];
      const home = f.teams.home.name === teamName;
      const us = home ? f.goals.home : f.goals.away;
      const them = home ? f.goals.away : f.goals.home;
      const opp = home ? f.teams.away.name : f.teams.home.name;
      record.last = `${us}-${them} vs ${opp}`;
    }
    return record;
  }

  function showTeamTooltip(e, team){
    const tt = document.getElementById('tooltipEl');
    const r = getTeamRecord(team.name);
    tt.innerHTML = `
      <div class="tt-title">${flagEmoji(team.name)} ${team.name}</div>
      Record: ${r.win}W ${r.draw}D ${r.lose}L<br>
      GF/GA: ${r.gf} / ${r.ga}<br>
      Last result: ${r.last || 'N/A'}
    `;
    tt.style.display = 'block';
    const x = Math.min(e.clientX, window.innerWidth - 240);
    const y = Math.min(e.clientY + 12, window.innerHeight - 120);
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';

    setTimeout(() => {
      document.addEventListener('click', hideTooltip, { once:true });
    }, 0);
  }
  function hideTooltip(){
    document.getElementById('tooltipEl').style.display = 'none';
  }

  /* ================= RENDER: MATCHES ================= */
  let currentMatchSubtab = 'today';

  function renderMatches(){
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '';
    const fixtures = state.fixtures || [];

    if(!fixtures.length){
      container.innerHTML = '<div class="empty-state">No match data available.</div>';
      return;
    }

    const todayStr = new Date().toDateString();
    let filtered;
    if(currentMatchSubtab === 'today'){
      filtered = fixtures.filter(f => new Date(f.fixture.date).toDateString() === todayStr);
    } else if(currentMatchSubtab === 'past'){
      filtered = fixtures.filter(f => new Date(f.fixture.date) < new Date() && new Date(f.fixture.date).toDateString() !== todayStr);
    } else {
      filtered = fixtures.filter(f => new Date(f.fixture.date) > new Date() && new Date(f.fixture.date).toDateString() !== todayStr);
    }

    filtered.sort((a,b) => new Date(a.fixture.date) - new Date(b.fixture.date));
    if(currentMatchSubtab === 'past') filtered.reverse();

    if(!filtered.length){
      container.innerHTML = `<div class="empty-state">No ${currentMatchSubtab} matches.</div>`;
      return;
    }

    filtered.forEach(f => container.appendChild(buildMatchCard(f)));
  }

  function buildMatchCard(f){
    const card = document.createElement('div');
    card.className = 'match-card';

    const date = new Date(f.fixture.date);
    const status = f.fixture.status.short;
    const isLive = ['1H','2H','HT','ET','BT','P','LIVE'].includes(status);
    const isDone = ['FT','AET','PEN'].includes(status);

    const meta = document.createElement('div');
    meta.className = 'match-meta';
    meta.innerHTML = `<span>${date.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                       <span>${f.league.round || ''}</span>`;
    card.appendChild(meta);

    const row = document.createElement('div');
    row.className = 'match-row';

    const home = document.createElement('div');
    home.className = 'match-team';
    home.innerHTML = `<span class="flag">${flagEmoji(f.teams.home.name)}</span><span class="team-name">${f.teams.home.name}</span>`;

    const center = document.createElement('div');
    center.className = 'match-center';
    if(isDone || isLive){
      center.innerHTML = `<span class="match-score">${f.goals.home ?? 0} - ${f.goals.away ?? 0}</span>`;
    } else {
      center.innerHTML = `<span class="match-time">${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
    }
    let badge;
    if(isLive){
      badge = `<span class="status-badge live"><span class="live-dot"></span>LIVE</span>`;
    } else if(isDone){
      badge = `<span class="status-badge ft">FT</span>`;
    } else {
      badge = `<span class="status-badge ns">SCHEDULED</span>`;
    }
    center.innerHTML += badge;

    const away = document.createElement('div');
    away.className = 'match-team right';
    away.innerHTML = `<span class="team-name">${f.teams.away.name}</span><span class="flag">${flagEmoji(f.teams.away.name)}</span>`;

    row.appendChild(home);
    row.appendChild(center);
    row.appendChild(away);
    card.appendChild(row);

    if(!isDone && !isLive){
      const calBtn = document.createElement('button');
      calBtn.className = 'calendar-btn';
      calBtn.textContent = '+ ADD TO CALENDAR';
      calBtn.addEventListener('click', () => downloadMatchIcs(f, date));
      card.appendChild(calBtn);
    }

    return card;
  }

  /* ================= CALENDAR EXPORT (.ics) ================= */
  function icsDate(d){
    return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  }

  function downloadMatchIcs(f, date){
    const start = date;
    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
    const title = `${f.teams.home.name} vs ${f.teams.away.name} (FIFA World Cup 2026)`;
    const desc = f.league.round ? `Round: ${f.league.round}` : 'FIFA World Cup 2026';
    const uid = `wc2026-${start.getTime()}-${f.teams.home.name}-${f.teams.away.name}`.replace(/\s+/g, '');

    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//WC2026 Tracker//EN',
      'CALSCALE:GREGORIAN',
      'BEGIN:VEVENT',
      `UID:${uid}`,
      `DTSTAMP:${icsDate(new Date())}`,
      `DTSTART:${icsDate(start)}`,
      `DTEND:${icsDate(end)}`,
      `SUMMARY:${title}`,
      `DESCRIPTION:${desc}`,
      'BEGIN:VALARM',
      'TRIGGER:-PT1H',
      'ACTION:DISPLAY',
      'DESCRIPTION:Match reminder',
      'END:VALARM',
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');

    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${f.teams.home.name}-vs-${f.teams.away.name}.ics`.replace(/\s+/g, '-');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ================= RENDER: GROUPS ================= */
  function renderGroups(){
    const container = document.getElementById('groupsContainer');
    container.innerHTML = '';
    const groups = state.standings || [];

    if(!groups.length){
      container.innerHTML = '<div class="empty-state">No group standings available.</div>';
      return;
    }

    groups.forEach((group, idx) => {
      const groupName = (group[0] && group[0].group) || `Group ${String.fromCharCode(65 + idx)}`;

      const acc = document.createElement('div');
      acc.className = 'group-accordion open';
      acc.dataset.groupName = groupName.toLowerCase();

      const header = document.createElement('button');
      header.className = 'group-header';
      header.innerHTML = `<span>${groupName}</span><span class="chev">▾</span>`;
      header.onclick = () => acc.classList.toggle('open');

      const body = document.createElement('div');
      body.className = 'group-body';

      const table = document.createElement('table');
      table.className = 'standings';
      table.innerHTML = `<thead><tr>
        <th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      group.forEach((t, i) => {
        const tr = document.createElement('tr');
        if(i < 2) tr.classList.add('qualify');
        else tr.classList.add('bottom');
        tr.dataset.teamName = t.team.name.toLowerCase();
        tr.innerHTML = `
          <td>${t.rank}</td>
          <td><div class="tname">${flagEmoji(t.team.name)} ${t.team.name}</div></td>
          <td>${t.all.played}</td>
          <td>${t.all.win}</td>
          <td>${t.all.draw}</td>
          <td>${t.all.lose}</td>
          <td>${t.all.goals.for}</td>
          <td>${t.all.goals.against}</td>
          <td>${t.goalsDiff}</td>
          <td class="pts">${t.points}</td>
        `;
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      body.appendChild(table);
      acc.appendChild(header);
      acc.appendChild(body);
      container.appendChild(acc);
    });

    filterGroups(document.getElementById('groupSearch').value);
  }

  function filterGroups(query){
    query = (query || '').trim().toLowerCase();
    document.querySelectorAll('#groupsContainer .group-accordion').forEach(acc => {
      let anyRowVisible = false;
      acc.querySelectorAll('tbody tr').forEach(tr => {
        const match = !query || tr.dataset.teamName.includes(query);
        tr.style.display = match ? '' : 'none';
        if(match) anyRowVisible = true;
      });
      const groupMatch = !query || acc.dataset.groupName.includes(query);
      acc.style.display = (anyRowVisible || groupMatch) ? '' : 'none';
      if(groupMatch && query){
        acc.querySelectorAll('tbody tr').forEach(tr => tr.style.display = '');
      }
    });
  }

  /* ================= PREDICT ================= */
  function computeTeamStrength(team){
    return team.points * 3 + team.goalsDiff;
  }

  function winProb(diff){
    return 1 / (1 + Math.exp(-diff / 4));
  }

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function simulateGroup(group, groupFixtures){
    const N = 3000;
    const strength = {};
    group.forEach(t => strength[t.team.name] = computeTeamStrength(t));
    const remaining = groupFixtures.filter(f => f.fixture.status.short === 'NS' &&
      f.teams.home.name in strength && f.teams.away.name in strength);

    const qualifyCount = {};
    group.forEach(t => qualifyCount[t.team.name] = 0);

    for(let i = 0; i < N; i++){
      const points = {};
      group.forEach(t => points[t.team.name] = t.points);

      remaining.forEach(f => {
        const home = f.teams.home.name, away = f.teams.away.name;
        const pHomeWin = winProb(strength[home] - strength[away]) * 0.8;
        const r = Math.random();
        if(r < pHomeWin){ points[home] += 3; }
        else if(r < pHomeWin + 0.2){ points[home] += 1; points[away] += 1; }
        else { points[away] += 3; }
      });

      const ranked = group.map(t => t.team.name).sort((a, b) => points[b] - points[a]);
      qualifyCount[ranked[0]]++;
      qualifyCount[ranked[1]]++;
    }

    return group
      .map(t => ({ name: t.team.name, pct: Math.round(qualifyCount[t.team.name] / N * 100) }))
      .sort((a, b) => b.pct - a.pct);
  }

  function simulateChampion(groups){
    const N = 3000;
    let teams = [];
    groups.forEach(group => {
      const sorted = [...group].sort((a, b) => b.points - a.points || b.goalsDiff - a.goalsDiff);
      sorted.slice(0, 2).forEach(t => teams.push({ name: t.team.name, strength: computeTeamStrength(t) }));
    });
    if(teams.length < 2) return [];

    const winCount = {};
    teams.forEach(t => winCount[t.name] = 0);

    for(let i = 0; i < N; i++){
      let pool = shuffle(teams.slice());
      while(pool.length > 1){
        const next = [];
        for(let j = 0; j < pool.length; j += 2){
          if(j + 1 >= pool.length){ next.push(pool[j]); continue; }
          const a = pool[j], b = pool[j + 1];
          next.push(Math.random() < winProb(a.strength - b.strength) ? a : b);
        }
        pool = next;
      }
      winCount[pool[0].name]++;
    }

    return teams
      .map(t => ({ name: t.name, pct: Math.round(winCount[t.name] / N * 1000) / 10 }))
      .sort((a, b) => b.pct - a.pct)
      .slice(0, 8);
  }

  function buildPredictBar(name, pct){
    return `<div class="predict-bar-row">
      <div class="predict-bar-label"><span>${flagEmoji(name)} ${name}</span><span class="pct">${pct}%</span></div>
      <div class="predict-bar-track"><div class="predict-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  function runPrediction(){
    const groups = state.standings || [];
    const fixtures = state.fixtures || [];
    const results = document.getElementById('predictResults');
    results.innerHTML = '';

    if(!groups.length){
      results.innerHTML = '<div class="empty-state">Standings not available yet — check back once group stage data loads.</div>';
      return;
    }

    const groupSection = document.createElement('div');
    groupSection.className = 'predict-section';
    groupSection.innerHTML = '<h3>Qualification Odds</h3>';
    groups.forEach((group, idx) => {
      const groupName = (group[0] && group[0].group) || `Group ${String.fromCharCode(65 + idx)}`;
      const groupFixtures = fixtures.filter(f => f.league.round === groupName);
      const qual = simulateGroup(group, groupFixtures);
      const block = document.createElement('div');
      block.className = 'predict-group-block';
      block.innerHTML = `<h4>${groupName.toUpperCase()}</h4>` + qual.map(t => buildPredictBar(t.name, t.pct)).join('');
      groupSection.appendChild(block);
    });
    results.appendChild(groupSection);

    const champs = simulateChampion(groups);
    if(champs.length){
      const champSection = document.createElement('div');
      champSection.className = 'predict-section';
      champSection.innerHTML = '<h3>Title Contenders</h3>' + champs.map(c => buildPredictBar(c.name, c.pct)).join('');
      results.appendChild(champSection);
    }
  }

  /* ================= TAB SWITCHING ================= */
  let predictRan = false;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab === 'predict' && !predictRan){
        predictRan = true;
        runPrediction();
      }
    });
  });

  document.querySelectorAll('.subtab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMatchSubtab = btn.dataset.subtab;
      renderMatches();
    });
  });

  /* ================= WIRE UP ================= */
  document.getElementById('refreshBtn').addEventListener('click', () => loadAll(true));
  document.getElementById('runPredictBtn').addEventListener('click', () => { predictRan = true; runPrediction(); });
  document.getElementById('groupSearch').addEventListener('input', e => filterGroups(e.target.value));

  /* ================= INIT ================= */
  // Load cached data immediately so UI isn't empty, then refresh from network.
  (function loadCachedFirst(){
    const cs = Storage.getCache('standings');
    const cf = Storage.getCache('fixtures');
    if(cs) state.standings = normalizeStandings(cs.data);
    if(cf) state.fixtures = normalizeFixtures(cf.data);
  })();
  renderAll();
  loadAll(false);

})();
</script>
